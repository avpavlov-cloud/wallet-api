name: Wallet API CI/CD

on:
  push:
    branches: [ main ]  # Запуск при пуше в основную ветку
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests and Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: wallet_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com | sh -s -- -b $(go env GOPATH)/bin v1.54.2

      - name: Run Linter
        run: golangci-lint run ./...

      - name: Run Migrations
        run: |
          curl -L https://github.com | tar xvz
          ./migrate -path migrations -database "postgres://user:password@localhost:5432/wallet_db?sslmode=disable" up

      - name: Run Go Tests
        env:
          DB_SOURCE: postgres://user:password@localhost:5432/wallet_db?sslmode=disable
          API_KEY: test-key-123
        run: go test -v -cover ./...

  build:
    name: Build Production Image
    needs: test # Запускать только если тесты прошли
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Сборка только при реальном пуше, не на PR
    
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t wallet-api:latest .
