root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Команда сборки (добавляем флаги для отладки)
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "migrations"]
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "toml"]
  log = "build-errors.log"
  stop_on_error = true

[screen]
  clear_on_rebuild = true
